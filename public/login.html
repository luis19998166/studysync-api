<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — StudySync</title>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-box">
      <h1>StudySync</h1>
      <p>Inicia sesión para gestionar tus sesiones de estudio</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" placeholder="••••••••"
               onkeydown="if(event.key==='Enter') login()" />
      </div>

      <button class="btn btn-primary" style="width:100%" onclick="login()">
        Iniciar sesión
      </button>

      <div id="msg" class="msg"></div>

      <p class="auth-footer">
        ¿Sin cuenta? <a href="/register.html" class="link">Regístrate aquí</a>
      </p>
    </div>
  </div>

  <script>
    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const msg      = document.getElementById('msg');

      msg.className = 'msg';
      msg.textContent = '';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          msg.className = 'msg error';
          msg.textContent = data.error || 'Credenciales inválidas.';
          return;
        }

        // Guardar el token en sessionStorage (expira cuando cierra el navegador)
        sessionStorage.setItem('token', data.token);
        sessionStorage.setItem('usuario', JSON.stringify(data.usuario));
        window.location.href = '/';
      } catch (e) {
        msg.className = 'msg error';
        msg.textContent = 'No se pudo conectar con el servidor.';
      }
    }
  </script>
</body>
</html>
